name: Deploy

# On merge to main: run the test gate, then the Studio's self-hosted runner
# rebuilds the native Mix release and restarts the launchd service. No Docker.
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix test

  deploy:
    needs: test
    # Register the Mac Studio as a self-hosted runner with this label, running as
    # the `tragarai` user (needs the app dir + the gui/<uid> launchd domain).
    runs-on: [self-hosted, tragar-studio]
    steps:
      - name: Rebuild + restart the native release
        run: |
          set -euo pipefail
          cd "${TRAGAR_APP_DIR:-/Users/tragarai/apps/tragar_ai}"
          # Grab the latest deploy script first (so script changes apply this run),
          # then hand off — it does the full reset → build → migrate → restart.
          git fetch origin main
          git checkout origin/main -- bin/deploy.sh
          chmod +x bin/deploy.sh
          ./bin/deploy.sh
