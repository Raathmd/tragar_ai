name: Core AI sidecar

# Independent of the app pipeline — only runs when the sidecar changes.
on:
  push:
    branches: [main]
    paths: ["coreai/**", ".github/workflows/coreai.yml"]
  pull_request:
    paths: ["coreai/**"]

env:
  IMAGE_NAME: ghcr.io/raathmd/tragar-coreai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke import
        run: |
          pip install -r coreai/requirements.txt
          python -c "import importlib.util as u; s=u.spec_from_file_location('app','coreai/app.py'); m=u.module_from_spec(s); s.loader.exec_module(m); print('import ok')"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./coreai
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, tragar-mini]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull + (re)start the sidecar, wait for healthy
        env:
          COREAI_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker compose --profile ai pull coreai
          docker compose --profile ai up -d --wait coreai
