# Tragar AI on the mini: app + Postgres. Secrets come from .env (gitignored).
# Deploy pulls the image from GHCR and runs migrations before starting.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: tragar_ai_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    # Override with a pinned tag on deploy, e.g. IMAGE=ghcr.io/raathmd/tragar_ai:<sha>
    image: ${IMAGE:-ghcr.io/raathmd/tragar_ai:latest}
    env_file: .env
    environment:
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:-localhost}
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@db/tragar_ai_prod}
      # SECRET_KEY_BASE comes from .env (mix phx.gen.secret).
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Core AI model sidecar (ML workload) ─────────────────────────────────────
  # Serves the Core AI contract: POST /interpret and /phrase. Disabled by default
  # (the app runs in :stub mode) — enable with `--profile ai` once the model is
  # ready, and set CORE_AI_MODE=http + CORE_AI_URL=http://coreai:8080 in .env.
  coreai:
    profiles: ["ai"]
    image: ${COREAI_IMAGE:-ghcr.io/raathmd/tragar-coreai:latest}
    restart: unless-stopped
    volumes:
      - models:/models # model weights live in a volume, not the image
    environment:
      MODEL_DIR: /models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    # If the mini has an NVIDIA GPU, uncomment to expose it:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

volumes:
  pgdata:
  models:
